name: CI Monorepo Chama-AI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # --------------------------
  # BUILD & TEST - FRONTEND
  # --------------------------
  build-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'
      - name: Cache Node modules
        uses: actions/cache@v3
        with:
          path: apps/frontend/node_modules
          key: ${{ runner.os }}-node-${{ hashFiles('apps/frontend/package-lock.json') }}
      - name: Install Dependencies
        run: |
          cd apps/frontend
          npm install
      - name: Build Frontend
        run: |
          cd apps/frontend
          npm run build

  # --------------------------
  # BUILD & TEST - USER SERVICE
  # --------------------------
  build-user-service:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '17'
      - name: Cache Maven dependencies
        uses: actions/cache@v3
        with:
          path: ~/.m2
          key: ${{ runner.os }}-maven-${{ hashFiles('apps/user-service/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-
      - name: Build & Test User Service
        run: mvn -f apps/user-service/pom.xml clean install -B

  # --------------------------
  # BUILD & TEST - NOTIFICATION SERVICE
  # --------------------------
  build-notification-service:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '17'
      - name: Cache Maven dependencies
        uses: actions/cache@v3
        with:
          path: ~/.m2
          key: ${{ runner.os }}-maven-${{ hashFiles('apps/notification-service/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-
      - name: Build & Test Notification Service
        run: mvn -f apps/notification-service/pom.xml clean install -B
